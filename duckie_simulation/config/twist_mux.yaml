# twist_mux configuration for duckie simulation
# Teleop has higher priority and overrides autonomous commands
# When teleop stops (timeout), autonomous takes over again

twist_mux:
  ros__parameters:
    topics:
      autonomous:
        topic: cmd_vel_auto
        timeout: 0.5
        priority: 10
      teleop:
        topic: cmd_vel_teleop
        timeout: 0.5
        priority: 50
