<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDF World Viewer — lane_world.sdf</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    overflow: hidden;
    height: 100vh;
  }

  #canvas-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  /* Top bar */
  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 52px;
    background: rgba(10, 10, 20, 0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    padding: 0 20px;
    z-index: 100;
    gap: 14px;
  }

  .top-bar .logo {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: #fff;
  }

  .top-bar .title {
    font-weight: 600; font-size: 15px;
    color: #f0f0f0;
  }

  .top-bar .subtitle {
    font-size: 12px; color: #888;
    margin-left: -6px;
  }

  .top-bar .spacer { flex: 1; }

  .top-bar .badge {
    background: rgba(99, 102, 241, 0.15);
    border: 1px solid rgba(99, 102, 241, 0.3);
    color: #a5b4fc;
    font-size: 11px; font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* Side panel */
  .side-panel {
    position: fixed;
    top: 60px; right: 12px;
    width: 280px;
    max-height: calc(100vh - 80px);
    background: rgba(15, 15, 25, 0.9);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    z-index: 100;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 13px;
    font-weight: 600;
    color: #ccc;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-header .count {
    background: rgba(99,102,241,0.2);
    color: #a5b4fc;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .model-list {
    overflow-y: auto;
    padding: 8px;
    flex: 1;
  }

  .model-list::-webkit-scrollbar { width: 4px; }
  .model-list::-webkit-scrollbar-track { background: transparent; }
  .model-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .model-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 12px;
  }

  .model-item:hover {
    background: rgba(255,255,255,0.05);
  }

  .model-item.selected {
    background: rgba(99, 102, 241, 0.15);
    border: 1px solid rgba(99, 102, 241, 0.25);
  }

  .model-item .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .model-item .name {
    flex: 1;
    color: #ccc;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .model-item .type {
    font-size: 10px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Info tooltip */
  .info-box {
    position: fixed;
    bottom: 16px; left: 16px;
    background: rgba(15,15,25,0.9);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 18px;
    z-index: 100;
    font-size: 12px;
    color: #999;
    line-height: 1.7;
  }

  .info-box kbd {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: #bbb;
  }

  /* View buttons */
  .view-buttons {
    position: fixed;
    bottom: 16px; right: 12px;
    display: flex; gap: 6px;
    z-index: 100;
  }

  .view-btn {
    width: 40px; height: 40px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(15,15,25,0.9);
    backdrop-filter: blur(20px);
    color: #aaa;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }

  .view-btn:hover {
    background: rgba(99, 102, 241, 0.2);
    border-color: rgba(99, 102, 241, 0.4);
    color: #fff;
  }

  /* Selected model info */
  .selected-info {
    padding: 10px 16px 14px;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-size: 11px;
    color: #888;
    line-height: 1.8;
    display: none;
  }

  .selected-info .label {
    color: #666;
    display: inline-block;
    width: 50px;
  }

  .selected-info .value {
    color: #bbb;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<!-- Top bar -->
<div class="top-bar">
  <div class="logo">S</div>
  <div class="title">SDF World Viewer</div>
  <div class="subtitle">lane_world.sdf</div>
  <div class="spacer"></div>
  <div class="badge">Gazebo SDF v1.8</div>
</div>

<!-- Side panel -->
<div class="side-panel">
  <div class="panel-header">

</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",

}

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ SCENE SETUP ============
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a12);
scene.fog = new THREE.FogExp2(0x0a0a12, 0.04);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(4.5, 5.5, 4.5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

// ============ CONTROLS ============
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 1;
controls.maxDistance = 20;
controls.target.set(0, 0, 0);

// ============ LIGHTING ============
const ambientLight = new THREE.AmbientLight(0x404060, 0.8);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xf2f0e6, 2.0);
sunLight.position.set(-5, 10, -3);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.left = -6;
sunLight.shadow.camera.right = 6;
sunLight.shadow.camera.top = 6;
sunLight.shadow.camera.bottom = -6;
scene.add(sunLight);

const fillLight = new THREE.DirectionalLight(0x6366f1, 0.3);
fillLight.position.set(5, 3, 5);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xa855f7, 0.2);
rimLight.position.set(-3, 2, 5);
scene.add(rimLight);

// ============ GRID ============
let gridHelper = new THREE.GridHelper(20, 40, 0x222240, 0x15152a);
gridHelper.position.y = -0.001;
scene.add(gridHelper);

// ============ SDF MODEL DATA ============
// Each model: { name, pose:[x,y,z,rx,ry,rz], geometry:{type, params}, material:{ambient,diffuse} }
const sdfModels = [
  // Ground plane
  { name: "ground_plane", pose: [0,0,0,0,0,0], geometry: { type: "plane", size: [20,20] }, material: { ambient: [0.55,0.55,0.55], diffuse: [0.6,0.6,0.6] }, category: "ground" },

  // Road surfaces
  { name: "road_top", pose: [0,1.0,0.001,0,0,0], geometry: { type: "box", size: [4.1,0.7,0.001] }, material: { ambient: [0.12,0.12,0.12], diffuse: [0.18,0.18,0.18] }, category: "road" },
  { name: "road_bot", pose: [0,-1.0,0.001,0,0,0], geometry: { type: "box", size: [4.1,0.7,0.001] }, material: { ambient: [0.12,0.12,0.12], diffuse: [0.18,0.18,0.18] }, category: "road" },
  { name: "road_left", pose: [-1.7,0,0.001,0,0,0], geometry: { type: "box", size: [0.7,2.7,0.001] }, material: { ambient: [0.12,0.12,0.12], diffuse: [0.18,0.18,0.18] }, category: "road" },
  { name: "road_right", pose: [1.7,0,0.001,0,0,0], geometry: { type: "box", size: [0.7,2.7,0.001] }, material: { ambient: [0.12,0.12,0.12], diffuse: [0.18,0.18,0.18] }, category: "road" },

  // Outer red rectangle
  { name: "red_outer_top", pose: [0,1.3,0.002,0,0,0], geometry: { type: "box", size: [4.1,0.06,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "border-outer" },
  { name: "red_outer_bot", pose: [0,-1.3,0.002,0,0,0], geometry: { type: "box", size: [4.1,0.06,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "border-outer" },
  { name: "red_outer_left", pose: [-2.02,0,0.002,0,0,0], geometry: { type: "box", size: [0.06,2.66,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "border-outer" },
  { name: "red_outer_right", pose: [2.02,0,0.002,0,0,0], geometry: { type: "box", size: [0.06,2.66,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "border-outer" },

  // Inner red rectangle
  { name: "red_inner_top", pose: [0,0.7,0.002,0,0,0], geometry: { type: "box", size: [2.86,0.06,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "border-inner" },
  { name: "red_inner_bot", pose: [0,-0.7,0.002,0,0,0], geometry: { type: "box", size: [2.86,0.06,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "border-inner" },
  { name: "red_inner_left", pose: [-1.4,0,0.002,0,0,0], geometry: { type: "box", size: [0.06,1.46,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "border-inner" },
  { name: "red_inner_right", pose: [1.4,0,0.002,0,0,0], geometry: { type: "box", size: [0.06,1.46,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "border-inner" },

  // Dashed center — Top
  { name: "dc_t1", pose: [-1.35,1.0,0.002,0,0,0], geometry: { type: "box", size: [0.30,0.06,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "dash" },
  { name: "dc_t2", pose: [-0.75,1.0,0.002,0,0,0], geometry: { type: "box", size: [0.30,0.06,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "dash" },
  { name: "dc_t3", pose: [-0.15,1.0,0.002,0,0,0], geometry: { type: "box", size: [0.30,0.06,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "dash" },
  { name: "dc_t4", pose: [0.45,1.0,0.002,0,0,0], geometry: { type: "box", size: [0.30,0.06,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "dash" },
  { name: "dc_t5", pose: [1.05,1.0,0.002,0,0,0], geometry: { type: "box", size: [0.30,0.06,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "dash" },

  // Dashed center — Bottom
  { name: "dc_b1", pose: [-1.35,-1.0,0.002,0,0,0], geometry: { type: "box", size: [0.30,0.06,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "dash" },
  { name: "dc_b2", pose: [-0.75,-1.0,0.002,0,0,0], geometry: { type: "box", size: [0.30,0.06,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "dash" },
  { name: "dc_b3", pose: [-0.15,-1.0,0.002,0,0,0], geometry: { type: "box", size: [0.30,0.06,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "dash" },
  { name: "dc_b4", pose: [0.45,-1.0,0.002,0,0,0], geometry: { type: "box", size: [0.30,0.06,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "dash" },
  { name: "dc_b5", pose: [1.05,-1.0,0.002,0,0,0], geometry: { type: "box", size: [0.30,0.06,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "dash" },

  // Dashed center — Left
  { name: "dc_l1", pose: [-1.7,-0.6,0.002,0,0,0], geometry: { type: "box", size: [0.06,0.30,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "dash" },
  { name: "dc_l2", pose: [-1.7,0.0,0.002,0,0,0], geometry: { type: "box", size: [0.06,0.30,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "dash" },
  { name: "dc_l3", pose: [-1.7,0.6,0.002,0,0,0], geometry: { type: "box", size: [0.06,0.30,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "dash" },

  // Dashed center — Right
  { name: "dc_r1", pose: [1.7,-0.6,0.002,0,0,0], geometry: { type: "box", size: [0.06,0.30,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "dash" },
  { name: "dc_r2", pose: [1.7,0.0,0.002,0,0,0], geometry: { type: "box", size: [0.06,0.30,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "dash" },
  { name: "dc_r3", pose: [1.7,0.6,0.002,0,0,0], geometry: { type: "box", size: [0.06,0.30,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "dash" },

  // Corner dashes — Top-right
  { name: "dc_tr1", pose: [1.50,1.00,0.002,0,0,-0.7854], geometry: { type: "box", size: [0.30,0.06,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "dash-corner" },
  { name: "dc_tr2", pose: [1.65,0.85,0.002,0,0,-0.7854], geometry: { type: "box", size: [0.30,0.06,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "dash-corner" },

  // Corner dashes — Top-left
  { name: "dc_tl1", pose: [-1.50,1.00,0.002,0,0,0.7854], geometry: { type: "box", size: [0.30,0.06,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "dash-corner" },
  { name: "dc_tl2", pose: [-1.65,0.85,0.002,0,0,0.7854], geometry: { type: "box", size: [0.30,0.06,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "dash-corner" },

  // Corner dashes — Bottom-right
  { name: "dc_br1", pose: [1.50,-1.00,0.002,0,0,0.7854], geometry: { type: "box", size: [0.30,0.06,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "dash-corner" },
  { name: "dc_br2", pose: [1.65,-0.85,0.002,0,0,0.7854], geometry: { type: "box", size: [0.30,0.06,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "dash-corner" },

  // Corner dashes — Bottom-left
  { name: "dc_bl1", pose: [-1.50,-1.00,0.002,0,0,-0.7854], geometry: { type: "box", size: [0.30,0.06,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "dash-corner" },
  { name: "dc_bl2", pose: [-1.65,-0.85,0.002,0,0,-0.7854], geometry: { type: "box", size: [0.30,0.06,0.001] }, material: { ambient: [0.95,0,0], diffuse: [1.0,0.05,0.05] }, category: "dash-corner" },
];

// ============ CATEGORY COLORS (for dots in the list) ============
const categoryColors = {
  "ground": "#888888",
  "road": "#2d2d2d",
  "border-outer": "#ff2233",
  "border-inner": "#ff4455",
  "dash": "#ff6677",
  "dash-corner": "#ff8899",
};

// ============ BUILD SCENE ============
const meshMap = {}; // name -> mesh
const outlineMeshes = {}; // name -> outline mesh

function createMaterial(diffuse) {
  return new THREE.MeshStandardMaterial({
    color: new THREE.Color(diffuse[0], diffuse[1], diffuse[2]),
    roughness: 0.7,
    metalness: 0.05,
  });
}

sdfModels.forEach(model => {
  let geometry;
  const g = model.geometry;

  if (g.type === "plane") {
    geometry = new THREE.PlaneGeometry(g.size[0], g.size[1]);
  } else if (g.type === "box") {
    // For thin boxes, extrude them a bit for visibility
    const sx = g.size[0], sy = g.size[1], sz = Math.max(g.size[2], 0.008);
    geometry = new THREE.BoxGeometry(sx, sz, sy); // SDF Y -> Three Z
  }

  const material = createMaterial(model.material.diffuse);
  const mesh = new THREE.Mesh(geometry, material);

  // SDF pose: x, y, z, roll, pitch, yaw
  // SDF coordinate system: X=forward, Y=left, Z=up
  // Three.js coordinate system: X=right, Y=up, Z=forward
  const [px, py, pz, rx, ry, rz] = model.pose;

  if (g.type === "plane") {
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.set(px, pz, -py);
  } else {
    mesh.position.set(px, pz + Math.max(g.size[2], 0.008) / 2, -py);
    mesh.rotation.y = -rz; // yaw
  }

  mesh.receiveShadow = true;
  mesh.castShadow = g.type !== "plane";
  mesh.userData = { modelData: model };

  scene.add(mesh);
  meshMap[model.name] = mesh;
});

// ============ MODEL LIST UI ============
const listEl = document.getElementById('model-list');
const countEl = document.getElementById('model-count');
const selectedInfoEl = document.getElementById('selected-info');
const infoPoseEl = document.getElementById('info-pose');
const infoSizeEl = document.getElementById('info-size');
const infoColorEl = document.getElementById('info-color');

countEl.textContent = sdfModels.length;

let selectedModel = null;
let originalMaterial = null;

sdfModels.forEach(model => {
  const item = document.createElement('div');
  item.className = 'model-item';
  item.dataset.name = model.name;

  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.style.background = categoryColors[model.category] || '#666';

  const name = document.createElement('div');
  name.className = 'name';
  name.textContent = model.name;

  const type = document.createElement('div');
  type.className = 'type';
  type.textContent = model.geometry.type;

  item.appendChild(dot);
  item.appendChild(name);
  item.appendChild(type);

  item.addEventListener('click', () => selectModel(model.name));
  listEl.appendChild(item);
});

function selectModel(name) {
  // Deselect previous
  if (selectedModel && meshMap[selectedModel]) {
    meshMap[selectedModel].material = originalMaterial;
    const prevItem = listEl.querySelector(`[data-name="${selectedModel}"]`);
    if (prevItem) prevItem.classList.remove('selected');
  }

  if (selectedModel === name) {
    selectedModel = null;
    selectedInfoEl.style.display = 'none';
    return;
  }

  selectedModel = name;
  const mesh = meshMap[name];
  const model = mesh.userData.modelData;

  originalMaterial = mesh.material;
  mesh.material = new THREE.MeshStandardMaterial({
    color: new THREE.Color(0x6366f1),
    emissive: new THREE.Color(0x6366f1),
    emissiveIntensity: 0.4,
    roughness: 0.3,
    metalness: 0.2,
  });

  const item = listEl.querySelector(`[data-name="${name}"]`);
  if (item) {
    item.classList.add('selected');
    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // Show info
  const [px, py, pz] = model.pose;
  infoPoseEl.textContent = `${px.toFixed(2)}, ${py.toFixed(2)}, ${pz.toFixed(3)}`;

  if (model.geometry.type === 'box') {
    const s = model.geometry.size;
    infoSizeEl.textContent = `${s[0]}×${s[1]}×${s[2]}m`;
  } else {
    const s = model.geometry.size;
    infoSizeEl.textContent = `${s[0]}×${s[1]}m`;
  }

  const d = model.material.diffuse;
  infoColorEl.textContent = `rgb(${Math.round(d[0]*255)}, ${Math.round(d[1]*255)}, ${Math.round(d[2]*255)})`;

  selectedInfoEl.style.display = 'block';
}

// ============ VIEW FUNCTIONS ============
window.setTopView = function() {
  camera.position.set(0, 7, 0.01);
  controls.target.set(0, 0, 0);
  controls.update();
};

window.setPerspectiveView = function() {
  camera.position.set(4.5, 5.5, 4.5);
  controls.target.set(0, 0, 0);
  controls.update();
};

let gridVisible = true;
window.toggleGrid = function() {
  gridVisible = !gridVisible;
  gridHelper.visible = gridVisible;
};

// ============ ANIMATION LOOP ============
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
